name: Essays
options:
  bundleIdPrefix: com.essays.app
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.3"
  generateEmptyDirectories: true
  defaultConfig: Release
settings:
  base:
    MARKETING_VERSION: 1.3.1
    CURRENT_PROJECT_VERSION: 5

configs:
  Debug:
    type: debug
    SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    type: release
    SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  Essays:
    type: application
    platform: macOS
    sources:
      - path: Models
      - path: Views
      - path: Services
      - path: Theme
      - path: Utilities
      - path: Resources
      - path: EssaysApp.swift
      - path: Info.plist
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.essays.app
        PRODUCT_NAME: Essays
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: Resources/Essays.entitlements
    entitlements:
      path: Resources/Essays.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    dependencies:
      - package: MarkdownView
        product: MarkdownView

  EssaysTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: EssaysTests
    dependencies:
      - target: Essays
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.essays.app.tests
        PRODUCT_NAME: EssaysTests
        GENERATE_INFOPLIST_FILE: true

packages:
  MarkdownView:
    url: https://github.com/mudkipme/MarkdownView
    branch: main

schemes:
  Essays:
    build:
      targets:
        Essays: [run, test, profile, analyze, archive]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EssaysTests
