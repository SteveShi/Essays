name: Essays
options:
  bundleIdPrefix: com.essays.app
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true
  defaultConfig: Release

configs:
  Debug:
    type: debug
    SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    type: release
    SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  Essays:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "**/.DS_Store"
          - "EssaysTests/**"
          - "project.yml"
          - ".git/**"
          - ".github/**"
          - "warnings.log"
          - "build/**"
          - "*.py"
          - "draw_icon.swift"
          - "base_icon.png"
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.essays.app
        PRODUCT_NAME: Essays
        MARKETING_VERSION: 1.0.2
        CURRENT_PROJECT_VERSION: 2
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: Resources/Essays.entitlements
    entitlements:
      path: Resources/Essays.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
