name: Essays
options:
  bundleIdPrefix: com.essays.app
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  xcodeVersion: "15.3"
  generateEmptyDirectories: true
  defaultConfig: Release
settings:
  base:
    MARKETING_VERSION: 2.5.5
    CURRENT_PROJECT_VERSION: 24

configs:
  Debug:
    type: debug
    SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    type: release
    SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  Essays:
    type: application
    platform: macOS
    sources:
      - path: Models
      - path: Views
      - path: Services
      - path: Theme
      - path: Utilities
      - path: Resources
      - path: EssaysApp.swift
    postBuildScripts: []
    preBuildScripts: []
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.essays.app
        PRODUCT_NAME: Essays
        ENABLE_HARDENED_RUNTIME: true
        ENABLE_APP_SANDBOX: NO
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUFeedURL: https://github.com/SteveShi/Essays/releases/latest/download/appcast.xml
        SUPublicEDKey: MkHAeSDd//tR7+jzLDuwomA0aHHe5+35hbQ4csagwF0=
        CODE_SIGN_ENTITLEMENTS: Resources/Essays.entitlements
    entitlements:
      path: Resources/Essays.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.personal-information.location: true
    dependencies:
      - package: MarkdownView
        product: MarkdownView
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
        
  EssaysiOS:
    type: application
    platform: iOS
    sources:
      - path: Models
      - path: Views
      - path: Services
      - path: Theme
      - path: Utilities
      - path: Resources
      - path: EssaysApp.swift
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: Info-iOS.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.essays.app.ios
        PRODUCT_NAME: Essays
        TARGETED_DEVICE_FAMILY: "1,2"
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: MarkdownView
        product: MarkdownView
      - package: KeyboardShortcuts
        product: KeyboardShortcuts

  EssaysTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: EssaysTests
    dependencies:
      - target: Essays
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.essays.app.tests
        PRODUCT_NAME: EssaysTests
        GENERATE_INFOPLIST_FILE: true

packages:
  MarkdownView:
    url: https://github.com/mudkipme/MarkdownView
    branch: main
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1

schemes:
  Essays:
    build:
      targets:
        Essays: [run, test, profile, analyze, archive]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EssaysTests
  EssaysiOS:
    build:
      targets:
        EssaysiOS: [run, test, profile, analyze, archive]
    run:
      config: Debug
    test:
      config: Debug
