name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      changelog: ${{ steps.check.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract Version and Notes
        id: check
        run: |
          # Extract current version
          VERSION=$(grep -m 1 "## \[" CHANGELOG.md | sed -E 's/## \[(.*)\].*/\1/')
          echo "Current Version: $VERSION"
          
          # Extract previous version
          git checkout HEAD^ CHANGELOG.md || true
          PREV_VERSION=$(grep -m 1 "## \[" CHANGELOG.md | sed -E 's/## \[(.*)\].*/\1/')
          echo "Previous Version: $PREV_VERSION"
          
          # Restore current CHANGELOG.md
          git checkout HEAD CHANGELOG.md
          
          # Extract latest changelog section
          # Finds content between the first and second H2 headers starting with [
          CHANGELOG=$(sed -n '/## \[/,/## \[/p' CHANGELOG.md | sed '$d')
          
          # Determine if we should release
          SHOULD_RELEASE="false"
          if [ "$VERSION" != "$PREV_VERSION" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SHOULD_RELEASE="true"
          fi
          
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Multi-line output for changelog
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-release:
    name: Build and Release
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project Essays.xcodeproj \
            -scheme Essays \
            -configuration Release \
            -archivePath build/Essays.xcarchive \
            ARCHS=arm64 \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export App
        run: |
          mkdir -p build/Export
          # We create a dummy ExportOptions.plist since we aren't signing for App Store/Distribution yet
          cat <<EOF > build/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
          
          cp -R build/Essays.xcarchive/Products/Applications/Essays.app build/Export/
          cd build/Export
          zip -r ../../Essays.zip Essays.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ needs.check-version.outputs.changelog }}
          files: Essays.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
